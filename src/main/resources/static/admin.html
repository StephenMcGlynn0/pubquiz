<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pub Quiz — Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; }
        .modal.open { display: flex; }
        .source-api { background: #1e3a5f; color: #93c5fd; }
        .source-user { background: #1a3a2a; color: #86efac; }
        tr:hover td { background: #1f2937; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans">

<div class="max-w-7xl mx-auto px-6 py-8">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-bold text-yellow-400">Admin Panel</h1>
            <p class="text-gray-400 text-sm mt-1">Manage quiz questions</p>
        </div>
        <a href="/" class="text-gray-400 hover:text-white text-sm">← Back to Quiz</a>
    </div>

    <!-- Stats bar -->
    <div class="grid grid-cols-3 gap-4 mb-8">
        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
            <p class="text-gray-400 text-xs uppercase tracking-wider mb-1">Total Questions</p>
            <p id="stat-total" class="text-2xl font-bold text-yellow-400">—</p>
        </div>
        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
            <p class="text-gray-400 text-xs uppercase tracking-wider mb-1">From API</p>
            <p id="stat-api" class="text-2xl font-bold text-blue-400">—</p>
        </div>
        <div class="bg-gray-800 rounded-xl p-4 border border-gray-700">
            <p class="text-gray-400 text-xs uppercase tracking-wider mb-1">User Added</p>
            <p id="stat-user" class="text-2xl font-bold text-green-400">—</p>
        </div>
    </div>

    <!-- Add question form -->
    <div class="bg-gray-800 border border-gray-700 rounded-2xl p-6 mb-8">
        <h2 class="text-lg font-semibold mb-5 text-yellow-400">Add New Question</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Category</label>
                <select id="add-category" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-yellow-400">
                    <option value="">Select a category</option>
                </select>
            </div>
            <div>
                <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Difficulty</label>
                <select id="add-difficulty" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-yellow-400">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
        </div>
        <div class="mb-4">
            <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Question</label>
            <input id="add-question" type="text" placeholder="Enter the question"
                   class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-yellow-400"/>
        </div>
        <div class="mb-4">
            <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Correct Answer</label>
            <input id="add-correct" type="text" placeholder="The correct answer"
                   class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-yellow-400"/>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-5">
            <div>
                <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Wrong Answer 1</label>
                <input id="add-wrong1" type="text" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-yellow-400"/>
            </div>
            <div>
                <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Wrong Answer 2</label>
                <input id="add-wrong2" type="text" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-yellow-400"/>
            </div>
            <div>
                <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Wrong Answer 3</label>
                <input id="add-wrong3" type="text" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-yellow-400"/>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="addQuestion()" class="bg-yellow-400 text-gray-900 font-bold px-6 py-2 rounded-lg hover:bg-yellow-300 transition text-sm">
                Add Question
            </button>
            <p id="add-error" class="text-red-400 text-sm"></p>
            <p id="add-success" class="text-green-400 text-sm"></p>
        </div>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap gap-3 mb-4">
        <input id="search" type="text" placeholder="Search questions..."
               oninput="applyFilters()"
               class="bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white text-sm focus:outline-none focus:border-yellow-400 flex-1 min-w-48"/>
        <select id="filter-category" onchange="applyFilters()"
                class="bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white text-sm focus:outline-none focus:border-yellow-400">
            <option value="">All Categories</option>
        </select>
        <select id="filter-source" onchange="applyFilters()"
                class="bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white text-sm focus:outline-none focus:border-yellow-400">
            <option value="">All Sources</option>
            <option value="api">API</option>
            <option value="user">User Added</option>
        </select>
        <p class="text-gray-400 text-sm self-center" id="result-count"></p>
    </div>

    <!-- Table -->
    <div class="bg-gray-800 border border-gray-700 rounded-2xl overflow-hidden">
        <table class="w-full text-sm">
            <thead>
            <tr class="border-b border-gray-700">
                <th class="text-left px-4 py-3 text-gray-400 font-semibold uppercase tracking-wider text-xs w-8">#</th>
                <th class="text-left px-4 py-3 text-gray-400 font-semibold uppercase tracking-wider text-xs">Question</th>
                <th class="text-left px-4 py-3 text-gray-400 font-semibold uppercase tracking-wider text-xs">Category</th>
                <th class="text-left px-4 py-3 text-gray-400 font-semibold uppercase tracking-wider text-xs">Difficulty</th>
                <th class="text-left px-4 py-3 text-gray-400 font-semibold uppercase tracking-wider text-xs">Source</th>
                <th class="text-left px-4 py-3 text-gray-400 font-semibold uppercase tracking-wider text-xs">Actions</th>
            </tr>
            </thead>
            <tbody id="questions-table"></tbody>
        </table>
        <div id="table-loading" class="text-center py-12 text-gray-400">Loading questions...</div>
    </div>

    <!-- Pagination -->
    <div class="flex justify-between items-center mt-4">
        <button id="prev-btn" onclick="changePage(-1)"
                class="bg-gray-700 border border-gray-600 px-4 py-2 rounded-lg text-sm hover:bg-gray-600 transition disabled:opacity-40">
            ← Previous
        </button>
        <p id="page-info" class="text-gray-400 text-sm"></p>
        <button id="next-page-btn" onclick="changePage(1)"
                class="bg-gray-700 border border-gray-600 px-4 py-2 rounded-lg text-sm hover:bg-gray-600 transition disabled:opacity-40">
            Next →
        </button>
    </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal" class="modal fixed inset-0 bg-black bg-opacity-70 z-50 items-center justify-center p-6">
    <div class="bg-gray-800 border border-gray-700 rounded-2xl p-6 w-full max-w-lg">
        <h2 class="text-lg font-semibold mb-5 text-yellow-400">Edit Question</h2>
        <input type="hidden" id="edit-id"/>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Category</label>
                <select id="edit-category" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-yellow-400">
                    <option value="">Select a category</option>
                </select>
            </div>
            <div>
                <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Difficulty</label>
                <select id="edit-difficulty" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-yellow-400">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
        </div>
        <div class="mb-4">
            <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Question</label>
            <input id="edit-question" type="text" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-yellow-400"/>
        </div>
        <div class="mb-4">
            <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Correct Answer</label>
            <input id="edit-correct" type="text" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-yellow-400"/>
        </div>
        <div class="grid grid-cols-3 gap-3 mb-5">
            <div>
                <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Wrong 1</label>
                <input id="edit-wrong1" type="text" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-yellow-400"/>
            </div>
            <div>
                <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Wrong 2</label>
                <input id="edit-wrong2" type="text" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-yellow-400"/>
            </div>
            <div>
                <label class="block text-xs text-gray-400 uppercase tracking-wider mb-1">Wrong 3</label>
                <input id="edit-wrong3" type="text" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-yellow-400"/>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="saveEdit()" class="flex-1 bg-yellow-400 text-gray-900 font-bold py-2 rounded-lg hover:bg-yellow-300 transition text-sm">
                Save Changes
            </button>
            <button onclick="closeModal()" class="flex-1 bg-gray-700 border border-gray-600 py-2 rounded-lg hover:bg-gray-600 transition text-sm">
                Cancel
            </button>
        </div>
        <p id="edit-error" class="text-red-400 text-sm mt-3"></p>
    </div>
</div>

<script>
    let allQuestions = [];
    let filteredQuestions = [];
    let currentPage = 1;
    const PAGE_SIZE = 20;

    // ── LOAD ──
    async function loadQuestions() {
        try {
            const res = await fetch('/api/admin/questions');
            allQuestions = await res.json();
            populateCategoryFilter();
            updateStats();
            applyFilters();
            document.getElementById('table-loading').style.display = 'none';
        } catch (e) {
            document.getElementById('table-loading').textContent = 'Failed to load questions.';
        }
    }

    function populateCategoryFilter() {
        const categories = [...new Set(allQuestions.map(q => q.category))].sort();
        const sel = document.getElementById('filter-category');
        const addSel = document.getElementById('add-category');
        const editSel = document.getElementById('edit-category');

        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            sel.appendChild(opt);

            const opt2 = document.createElement('option');
            opt2.value = cat;
            opt2.textContent = cat;
            addSel.appendChild(opt2);

            const opt3 = document.createElement('option');
            opt3.value = cat;
            opt3.textContent = cat;
            editSel.appendChild(opt3);
        });
    }

    function updateStats() {
        document.getElementById('stat-total').textContent = allQuestions.length;
        document.getElementById('stat-api').textContent = allQuestions.filter(q => q.source === 'api' || !q.source).length;
        document.getElementById('stat-user').textContent = allQuestions.filter(q => q.source === 'user').length;
    }

    // ── FILTERS ──
    function applyFilters() {
        const search = document.getElementById('search').value.toLowerCase();
        const category = document.getElementById('filter-category').value;
        const source = document.getElementById('filter-source').value;

        filteredQuestions = allQuestions.filter(q => {
            const matchSearch = !search || q.question.toLowerCase().includes(search);
            const matchCategory = !category || q.category === category;
            const matchSource = !source || q.source === source || (!q.source && source === 'api');
            return matchSearch && matchCategory && matchSource;
        });

        currentPage = 1;
        document.getElementById('result-count').textContent = `${filteredQuestions.length} results`;
        renderTable();
    }

    // ── TABLE ──
    function renderTable() {
        const start = (currentPage - 1) * PAGE_SIZE;
        const end = start + PAGE_SIZE;
        const page = filteredQuestions.slice(start, end);
        const totalPages = Math.ceil(filteredQuestions.length / PAGE_SIZE);

        const tbody = document.getElementById('questions-table');
        tbody.innerHTML = '';

        if (page.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-12 text-gray-400">No questions found.</td></tr>';
        }

        page.forEach((q, i) => {
            const wrong = q.incorrectAnswers || [];
            const tr = document.createElement('tr');
            tr.className = 'border-b border-gray-700 cursor-pointer';
            tr.innerHTML = `
                <td class="px-4 py-3 text-gray-500">${start + i + 1}</td>
                <td class="px-4 py-3 max-w-xs">
                    <p class="truncate" title="${escapeHtml(q.question)}">${escapeHtml(q.question)}</p>
                </td>
                <td class="px-4 py-3 text-gray-300">${escapeHtml(q.category)}</td>
                <td class="px-4 py-3 capitalize text-gray-300">${q.difficulty}</td>
                <td class="px-4 py-3">
                    <span class="text-xs font-semibold px-2 py-1 rounded-full ${q.source === 'user' ? 'source-user' : 'source-api'}">
                        ${q.source === 'user' ? 'User' : 'API'}
                    </span>
                </td>
                <td class="px-4 py-3">
                    <div class="flex gap-2">
                        <button onclick="openEdit(${q.id})" class="text-xs bg-gray-700 border border-gray-600 px-3 py-1 rounded-lg hover:border-yellow-400 hover:text-yellow-400 transition">
                            Edit
                        </button>
                        <button onclick="deleteQuestion(${q.id})" class="text-xs bg-gray-700 border border-gray-600 px-3 py-1 rounded-lg hover:border-red-500 hover:text-red-400 transition">
                            Delete
                        </button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages || 1}`;
        document.getElementById('prev-btn').disabled = currentPage === 1;
        document.getElementById('next-page-btn').disabled = currentPage >= totalPages;
    }

    function changePage(dir) {
        const totalPages = Math.ceil(filteredQuestions.length / PAGE_SIZE);
        currentPage = Math.max(1, Math.min(currentPage + dir, totalPages));
        renderTable();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── ADD ──
    async function addQuestion() {
        document.getElementById('add-error').textContent = '';
        document.getElementById('add-success').textContent = '';

        const category = document.getElementById('add-category').value.trim();
        const difficulty = document.getElementById('add-difficulty').value;
        const question = document.getElementById('add-question').value.trim();
        const correctAnswer = document.getElementById('add-correct').value.trim();
        const wrong1 = document.getElementById('add-wrong1').value.trim();
        const wrong2 = document.getElementById('add-wrong2').value.trim();
        const wrong3 = document.getElementById('add-wrong3').value.trim();

        if (!category || !question || !correctAnswer || !wrong1 || !wrong2 || !wrong3) {
            document.getElementById('add-error').textContent = 'All fields are required.';
            return;
        }

        try {
            const res = await fetch('/api/admin/questions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    category, difficulty, question,
                    correctAnswer,
                    incorrectAnswers: [wrong1, wrong2, wrong3]
                })
            });

            if (res.ok) {
                document.getElementById('add-success').textContent = 'Question added!';
                clearAddForm();
                await loadQuestions();
            } else {
                const data = await res.json();
                document.getElementById('add-error').textContent = data.error || 'Failed to add question.';
            }
        } catch (e) {
            document.getElementById('add-error').textContent = 'Something went wrong.';
        }
    }

    function clearAddForm() {
        ['add-category', 'add-question', 'add-correct', 'add-wrong1', 'add-wrong2', 'add-wrong3'].forEach(id => {
            document.getElementById(id).value = '';
        });
        document.getElementById('add-difficulty').value = 'easy';
    }

    // ── EDIT ──
    function openEdit(id) {
        const q = allQuestions.find(q => q.id === id);
        if (!q) return;

        const wrongAnswers = q.incorrectAnswers || [];

        document.getElementById('edit-id').value = q.id;
        document.getElementById('edit-category').value = q.category;
        document.getElementById('edit-difficulty').value = q.difficulty;
        document.getElementById('edit-question').value = q.question;
        document.getElementById('edit-correct').value = q.correctAnswer;
        document.getElementById('edit-wrong1').value = wrongAnswers[0] || '';
        document.getElementById('edit-wrong2').value = wrongAnswers[1] || '';
        document.getElementById('edit-wrong3').value = wrongAnswers[2] || '';
        document.getElementById('edit-error').textContent = '';

        document.getElementById('edit-modal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('edit-modal').classList.remove('open');
    }

    async function saveEdit() {
        document.getElementById('edit-error').textContent = '';

        const id = document.getElementById('edit-id').value;
        const category = document.getElementById('edit-category').value.trim();
        const difficulty = document.getElementById('edit-difficulty').value;
        const question = document.getElementById('edit-question').value.trim();
        const correctAnswer = document.getElementById('edit-correct').value.trim();
        const wrong1 = document.getElementById('edit-wrong1').value.trim();
        const wrong2 = document.getElementById('edit-wrong2').value.trim();
        const wrong3 = document.getElementById('edit-wrong3').value.trim();

        if (!category || !question || !correctAnswer || !wrong1 || !wrong2 || !wrong3) {
            document.getElementById('edit-error').textContent = 'All fields are required.';
            return;
        }

        try {
            const res = await fetch(`/api/admin/questions/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    category, difficulty, question,
                    correctAnswer,
                    incorrectAnswers: [wrong1, wrong2, wrong3]
                })
            });

            if (res.ok) {
                closeModal();
                await loadQuestions();
            } else {
                const data = await res.json();
                document.getElementById('edit-error').textContent = data.error || 'Failed to update.';
            }
        } catch (e) {
            document.getElementById('edit-error').textContent = 'Something went wrong.';
        }
    }

    // ── DELETE ──
    async function deleteQuestion(id) {
        if (!confirm('Are you sure you want to delete this question?')) return;

        try {
            await fetch(`/api/admin/questions/${id}`, { method: 'DELETE' });
            await loadQuestions();
        } catch (e) {
            alert('Failed to delete question.');
        }
    }

    // ── UTILS ──
    function escapeHtml(str) {
        const txt = document.createElement('textarea');
        txt.innerHTML = str || '';
        const decoded = txt.value;
        const div = document.createElement('div');
        div.textContent = decoded;
        return div.innerHTML;
    }

    // Close modal on backdrop click
    document.getElementById('edit-modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    loadQuestions();
</script>
</body>
</html>
